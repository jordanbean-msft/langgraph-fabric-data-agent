[project]
name = "langgraph-fabric-core"
version = "0.1.0"
description = "Core LangGraph agent implementation for Fabric Data Agent (interface-agnostic)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "azure-identity==1.25.3",
  "httpx==0.28.1",
  "langchain-core==1.3.3",
  "langchain-openai==1.1.12",
  "langgraph==1.1.4",
  "mcp==1.26.0",
  "pydantic==2.12.5",
  "pydantic-settings==2.13.1",
  "python-dotenv==1.2.2",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"
